<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Code</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { display: flex; height: 100vh; background: #1a1a2e; color: #eee; font-family: sans-serif; }
    #sidebar { width: 200px; min-width: 200px; padding: 16px; background: #16213e; display: flex; flex-direction: column; gap: 12px; }
    #game-area { flex: 1; display: flex; flex-direction: column; }
    #canvas-wrap { flex: 1; overflow: hidden; position: relative; }
    canvas { display: block; width: 100%; height: 100%; cursor: grab; }
    canvas.dragging { cursor: grabbing; }
    #hand-area { height: 120px; background: #0f3460; display: flex; align-items: center; padding: 12px; gap: 8px; }
    #actions { display: flex; gap: 8px; margin-left: auto; }
    button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    #btn-play { background: #e94560; color: #fff; }
    #btn-swap { background: #533483; color: #fff; }
    #btn-pass { background: #444; color: #ccc; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #start-screen { position: fixed; inset: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    #start-screen h1 { font-size: 2.5rem; letter-spacing: 2px; }
    #start-screen label { display: flex; flex-direction: column; gap: 4px; font-size: 14px; }
    #start-screen input, #start-screen select { padding: 6px 10px; border-radius: 4px; border: 1px solid #444; background: #222; color: #eee; }
    #start-screen #player-names { display: flex; flex-direction: column; gap: 8px; }
    #start-screen #btn-start { background: #e94560; color: #fff; font-size: 1rem; padding: 10px 32px; margin-top: 8px; }
    #end-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
    #end-screen h2 { font-size: 2rem; }
    #end-screen #final-scores { list-style: none; font-size: 1.2rem; display: flex; flex-direction: column; gap: 8px; }
    #end-screen #btn-restart { background: #e94560; color: #fff; font-size: 1rem; padding: 10px 32px; }
    .score-entry { display: flex; justify-content: space-between; gap: 24px; }
    .score-entry.current { font-weight: bold; color: #e94560; }
  </style>
</head>
<body>
  <!-- Start screen -->
  <div id="start-screen">
    <h1>COLOR CODE</h1>
    <label>
      Number of players
      <select id="player-count">
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4" selected>4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>
    </label>
    <div id="player-names"></div>
    <button id="btn-start">Start Game</button>
  </div>

  <!-- End screen -->
  <div id="end-screen">
    <h2>Game Over</h2>
    <ul id="final-scores"></ul>
    <button id="btn-restart">Play Again</button>
  </div>

  <!-- Game -->
  <div id="sidebar">
    <h2 style="font-size:1.1rem;letter-spacing:1px;">COLOR CODE</h2>
    <div id="current-player" style="font-size:0.9rem;color:#aaa;">—</div>
    <div id="bag-count" style="font-size:0.85rem;color:#888;">Bag: —</div>
    <hr style="border-color:#333;" />
    <div id="scores" style="display:flex;flex-direction:column;gap:6px;font-size:0.9rem;"></div>
  </div>

  <div id="game-area">
    <div id="canvas-wrap">
      <canvas id="board-canvas"></canvas>
    </div>
    <div id="hand-area">
      <div id="hand-tiles" style="display:flex;gap:8px;"></div>
      <div id="actions">
        <button id="btn-play" disabled>Play</button>
        <button id="btn-swap" disabled>Swap</button>
        <button id="btn-pass">Pass</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
